# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "b43195d2d9d252a77b4c35c097443922"
name = "WhatsApp Chat & Share Button"
application_url = "https://whatsapp-chat-button-production-1271.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [webhooks.privacy_compliance]
  customer_deletion_url = "https://whatsapp-chat-button-production-1271.up.railway.app/webhooks/customers/redact"
  customer_data_request_url = "https://whatsapp-chat-button-production-1271.up.railway.app/webhooks/customers/data_request"
  shop_deletion_url = "https://whatsapp-chat-button-production-1271.up.railway.app/webhooks/shop/redact"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products"

[auth]
redirect_urls = [ "https://whatsapp-chat-button-production-1271.up.railway.app/api/auth" ]

[app_proxy]
url = "https://whatsapp-chat-button-production-1271.up.railway.app"
subpath = "whatsapp"
prefix = "apps"
